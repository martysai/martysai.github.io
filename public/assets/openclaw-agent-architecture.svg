<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw personal agent architecture on Azure</title>
  <desc id="desc">A layered architecture: user channels reach OpenClaw on an Azure Linux VM; OpenClaw routes to models, GitHub, scheduled workflows, cloud-drive read-only context, GitOps, and systemd health checks.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4d473f" />
    </marker>
    <style>
      .bg { fill: #fbfaf6; }
      .zone { fill: #fffefa; stroke: #e3dacc; stroke-width: 2; }
      .zone-title { font: 700 18px system-ui, -apple-system, Segoe UI, sans-serif; fill: #171614; }
      .box { fill: #ffffff; stroke: #d8cdbc; stroke-width: 2; }
      .box-blue { fill: #eef4ff; stroke: #8fb0f0; }
      .box-green { fill: #eff9f6; stroke: #8bc9bd; }
      .box-sand { fill: #f8f1e6; stroke: #d7bd93; }
      .box-risk { fill: #fff4ec; stroke: #e4b08c; }
      .label { font: 700 17px system-ui, -apple-system, Segoe UI, sans-serif; fill: #171614; }
      .sub { font: 13px system-ui, -apple-system, Segoe UI, sans-serif; fill: #65615a; }
      .tiny { font: 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #65615a; }
      .line { fill: none; stroke: #4d473f; stroke-width: 2; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #8e887d; stroke-width: 1.7; stroke-dasharray: 6 6; marker-end: url(#arrow); }
      .pill { fill: #171614; }
      .pill-text { font: 700 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #fffefa; letter-spacing: .06em; }
    </style>
  </defs>

  <rect class="bg" width="1120" height="720" rx="34" />

  <rect class="zone" x="56" y="52" width="246" height="616" rx="28" />
  <text class="zone-title" x="84" y="92">Human interface</text>
  <rect class="box box-blue" x="84" y="126" width="190" height="86" rx="20" />
  <text class="label" x="112" y="164">Telegram / chat</text>
  <text class="sub" x="112" y="187">interactive requests</text>
  <rect class="box" x="84" y="238" width="190" height="86" rx="20" />
  <text class="label" x="112" y="275">Reviews</text>
  <text class="sub" x="112" y="298">approve sends &amp; writes</text>
  <rect class="box box-sand" x="84" y="350" width="190" height="86" rx="20" />
  <text class="label" x="112" y="386">Local drafts</text>
  <text class="sub" x="112" y="409">reports before delivery</text>

  <rect class="zone" x="348" y="52" width="424" height="616" rx="28" />
  <text class="zone-title" x="376" y="92">Azure Linux VM</text>
  <rect class="box box-green" x="414" y="124" width="292" height="104" rx="24" />
  <text class="label" x="482" y="164">OpenClaw runtime</text>
  <text class="sub" x="462" y="188">tools · memory · approvals · routing</text>

  <rect class="box" x="386" y="274" width="164" height="82" rx="20" />
  <text class="label" x="420" y="309">Cron jobs</text>
  <text class="sub" x="420" y="332">scheduled work</text>
  <rect class="box" x="570" y="274" width="164" height="82" rx="20" />
  <text class="label" x="610" y="309">GitOps</text>
  <text class="sub" x="598" y="332">pull &amp; reconcile</text>

  <rect class="box box-sand" x="386" y="396" width="164" height="82" rx="20" />
  <text class="label" x="426" y="431">Systemd</text>
  <text class="sub" x="416" y="454">health &amp; limits</text>
  <rect class="box box-risk" x="570" y="396" width="164" height="82" rx="20" />
  <text class="label" x="606" y="431">Guardrails</text>
  <text class="sub" x="604" y="454">approval gates</text>

  <rect class="box box-blue" x="414" y="526" width="292" height="84" rx="22" />
  <text class="label" x="468" y="561">Read-only context</text>
  <text class="sub" x="454" y="584">cloud-drive mounts · local files</text>

  <rect class="zone" x="818" y="52" width="246" height="616" rx="28" />
  <text class="zone-title" x="846" y="92">External services</text>
  <rect class="box box-blue" x="846" y="126" width="190" height="86" rx="20" />
  <text class="label" x="881" y="163">GitHub</text>
  <text class="sub" x="876" y="186">repos · PRs · template</text>
  <rect class="box box-green" x="846" y="244" width="190" height="86" rx="20" />
  <text class="label" x="875" y="281">Model lanes</text>
  <text class="sub" x="872" y="304">Copilot default + fallback</text>
  <rect class="box box-sand" x="846" y="362" width="190" height="86" rx="20" />
  <text class="label" x="884" y="399">Cloud docs</text>
  <text class="sub" x="874" y="422">read-only boundary</text>
  <rect class="box box-risk" x="846" y="480" width="190" height="86" rx="20" />
  <text class="label" x="888" y="517">Outbound</text>
  <text class="sub" x="870" y="540">email/calendar after approval</text>

  <path class="line" d="M 274 169 C 328 169 350 176 414 176" />
  <path class="line" d="M 414 190 C 356 232 330 260 274 281" />
  <path class="line-soft" d="M 274 393 C 332 430 348 500 414 562" />

  <path class="line" d="M 560 228 L 468 274" />
  <path class="line" d="M 560 228 L 652 274" />
  <path class="line" d="M 508 356 L 508 396" />
  <path class="line" d="M 612 356 L 612 396" />
  <path class="line" d="M 560 228 C 560 342 560 430 560 526" />

  <path class="line" d="M 706 176 C 758 176 786 169 846 169" />
  <path class="line" d="M 706 176 C 772 206 788 266 846 287" />
  <path class="line-soft" d="M 706 568 C 758 522 782 418 846 405" />
  <path class="line-soft" d="M 734 437 C 782 458 800 505 846 523" />

  <path class="line-soft" d="M 846 169 C 760 214 732 262 652 274" />
  <path class="line-soft" d="M 846 405 C 780 448 752 520 706 568" />

  <rect class="pill" x="436" y="642" width="248" height="30" rx="15" />
  <text class="pill-text" x="460" y="662">PRIVATE BY DEFAULT · EXPLICIT WRITES</text>
</svg>
